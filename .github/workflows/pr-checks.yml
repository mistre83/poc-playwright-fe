name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  skip-e2e-for-feature-prs:
    name: E2E / Staging Smoke
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Check if chore PR
        id: is_chore
        uses: actions/github-script@v7
        with:
          script: |
            const isChore = context.payload.pull_request.labels.some(
              l => l.name === 'autorelease: pending'
            )
            core.setOutput('chore', String(isChore))

      - name: Pass check for feature PRs
        if: steps.is_chore.outputs.chore == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.payload.pull_request.head.sha,
              state: 'success',
              context: 'E2E / Staging Smoke',
              description: 'Not required for feature PRs'
            })
