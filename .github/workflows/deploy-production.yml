name: Deploy Production

on:
  release:
    types: [published]

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      deployments: write
    environment:
      name: production

    steps:
      - name: Extract release version
        id: version
        run: echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-south-1

      - name: Derive resource names
        id: names
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          PROJECT="poc-playwright"
          echo "account_id=${ACCOUNT_ID}"                                          >> $GITHUB_OUTPUT
          echo "ecr_registry=${ACCOUNT_ID}.dkr.ecr.eu-south-1.amazonaws.com"      >> $GITHUB_OUTPUT
          echo "ecr_repo=${PROJECT}-fe"                                            >> $GITHUB_OUTPUT
          echo "ecs_cluster=${PROJECT}-production"                                 >> $GITHUB_OUTPUT
          echo "ecs_service=${PROJECT}-production"                                 >> $GITHUB_OUTPUT
          echo "task_family=${PROJECT}-production"                                 >> $GITHUB_OUTPUT
          echo "ssm_pending_sha=/${PROJECT}/production/pending-sha"                >> $GITHUB_OUTPUT

      - name: Read and validate approval token from SSM
        id: pending
        run: |
          PARAM=$(aws ssm get-parameter \
            --name "/poc-playwright/production/pending-approval" \
            --query 'Parameter.Value' --output text 2>/dev/null) || {
            echo "::error::No approval token found in SSM. Run promote.yml and ensure smoke tests pass before deploying to production."
            exit 1
          }

          SHA=$(echo "${PARAM}" | jq -r '.sha')
          APPROVED_AT=$(echo "${PARAM}" | jq -r '.approved_at')
          SMOKE_RUN_URL=$(echo "${PARAM}" | jq -r '.smoke_run_url')

          if [ -z "${SHA}" ] || [ "${SHA}" = "null" ]; then
            echo "::error::Approval token is malformed — missing sha field."
            exit 1
          fi

          # Validate approval is not stale (max 7 days)
          APPROVED_TS=$(date -d "${APPROVED_AT}" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%SZ" "${APPROVED_AT}" +%s)
          NOW_TS=$(date +%s)
          AGE_DAYS=$(( (NOW_TS - APPROVED_TS) / 86400 ))
          if [ "${AGE_DAYS}" -gt 7 ]; then
            echo "::error::Approval token is stale (${AGE_DAYS} days old). Re-run promote.yml to generate a fresh approval."
            exit 1
          fi

          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "Approval: sha=${SHA}, approved_at=${APPROVED_AT}, age=${AGE_DAYS}d, smoke_run=${SMOKE_RUN_URL}"

      - name: Verify approved image exists in ECR
        run: |
          IMAGE_TAG="sha-${{ steps.pending.outputs.sha }}"
          aws ecr describe-images \
            --repository-name "${{ steps.names.outputs.ecr_repo }}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region eu-south-1 > /dev/null || {
            echo "::error::Image ${IMAGE_TAG} not found in ECR. The approved image may have been deleted."
            exit 1
          }

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-south-1 | \
            docker login --username AWS --password-stdin \
            "${{ steps.names.outputs.ecr_registry }}"

      - name: Re-tag image for production
        run: |
          REGISTRY="${{ steps.names.outputs.ecr_registry }}"
          REPO="${{ steps.names.outputs.ecr_repo }}"
          SOURCE_TAG="sha-${{ steps.pending.outputs.sha }}"
          VERSION="${{ steps.version.outputs.tag }}"

          # Fetch manifest of the staging-tested image
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${REPO}" \
            --image-ids imageTag="${SOURCE_TAG}" \
            --query 'images[0].imageManifest' --output text)

          # Push same manifest with version and latest tags
          aws ecr put-image \
            --repository-name "${REPO}" \
            --image-tag "${VERSION}" \
            --image-manifest "${MANIFEST}"

          aws ecr put-image \
            --repository-name "${REPO}" \
            --image-tag "latest" \
            --image-manifest "${MANIFEST}"

      - name: Register new ECS task definition
        id: task_def
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          IMAGE="${{ steps.names.outputs.ecr_registry }}/${{ steps.names.outputs.ecr_repo }}:${VERSION}"

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${{ steps.names.outputs.task_family }}" \
            --query 'taskDefinition' --output json | \
            jq --arg IMAGE "${IMAGE}" \
              'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) |
               .containerDefinitions[0].image = $IMAGE')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' --output text)

          echo "task_def_arn=${NEW_ARN}" >> $GITHUB_OUTPUT

      - name: Deploy to ECS production
        run: |
          aws ecs update-service \
            --cluster "${{ steps.names.outputs.ecs_cluster }}" \
            --service "${{ steps.names.outputs.ecs_service }}" \
            --task-definition "${{ steps.task_def.outputs.task_def_arn }}" \
            --region eu-south-1 > /dev/null

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.names.outputs.ecs_cluster }}" \
            --services "${{ steps.names.outputs.ecs_service }}" \
            --region eu-south-1

      - name: Read production ALB DNS
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "poc-playwright-production" \
            --query 'LoadBalancers[0].DNSName' --output text)
          echo "alb_dns=${ALB_DNS}" >> $GITHUB_OUTPUT

      - name: Update GitHub Environment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: '${{ github.event.release.tag_name }}',
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: '${{ steps.version.outputs.tag }}'
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment_url: 'http://${{ steps.alb.outputs.alb_dns }}',
              description: 'Deploy ${{ steps.version.outputs.tag }} completato'
            });
